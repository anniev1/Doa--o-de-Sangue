<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doação de sangue</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <div id="navbar">

            <a href="https://i.pinimg.com/736x/1f/97/9d/1f979d2b7703fbdf0ffb7dad1de2ff49.jpg">
                <img id="icon" src="https://i.pinimg.com/736x/9e/07/cc/9e07cc96a0468958f73cb3a158fb502e.jpg" alt="escudo do pet">
            </a>

            <h2>Formulário De Doação</h2>

            <ul id="links">
                <li>Arquivos</li>
                <li>Sair</li>
            </ul>

        </div>
    </header>

    <main>
       

        <br><br>

         <div class="container">
        <form id="sangueDoa">

             <label for="nome">Nome do Doador:</label>
                <input type="text" id="nome" placeholder="Digite seu nome...">

            <label for="sobrenome">Sobrenome do Doador:</label>
                <input type="text" id="sobrenome" placeholder="Digite seu Sobrenome...">
                

                <label for="email">Email do Doador:</label>
                <input type="email" id="email" placeholder="Digite o email...">

                <label for="idade">Idade do Doador:</label>
                <input type="number" id="idade" placeholder="Digite a idade...">

                <label for="peso">Peso do Doador:</label>
                <input type="number" id="peso" placeholder="Digite seu peso...">

                <label for="tipo">Tipo Sanguíneo:</label>
                <select name="tipo" id="tipo">
                    <option value="">Selecione</option>
                    <option value="a+">A+</option>
                    <option value="a-">A-</option>
                    <option value="b+">B+</option>
                    <option value="b-">B-</option>
                    <option value="ab+">AB+</option>
                    <option value="ab-">AB-</option>
                    <option value="o+">O+</option>
                    <option value="o-">O-</option>
                </select>

                <label for="telefone">Telefone do Doador:</label>
                <input type="tel" id="telefone" placeholder="(xx) xxxxx-xxxx" required>

                <label for="cidade">Cidade:</label>
                <input type="text" id="cidade" placeholder="Digite sua cidade..." required>

                <label for="estado">Estado:</label>
                <input type="text" id="estado" placeholder="Digite seu estado..." required>
                <br>

              <button type="submit">Enviar</button>
               
            </form>
                <div id="resultado"></div>
                    <script src="scripts/script.js"></script>
              
        
    </div>
</main>
